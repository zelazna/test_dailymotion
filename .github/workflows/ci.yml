name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Init database
        run: psql -f init.sql postgresql://appuser:changeme@localhost:5432/testdb

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://appuser:changeme@localhost:5432/testdb
          SMTP_API_KEY: changeme
          EMAIL_FROM: noreply@example.com
          PYTHONPATH: .
          RABBITMQ_URL: amqp://guest:guest@rabbitmq_test:5672//
