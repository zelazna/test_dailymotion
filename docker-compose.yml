name: user-registration-api

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-userdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-userdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-userdb}
      SMTP_API_KEY: ${SMTP_API_KEY:-changeme}
      EMAIL_FROM: ${EMAIL_FROM:-delivered@resend.dev}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend
    develop:
      watch:
        - path: ./app
          action: sync+restart
          target: /app/app
        - path: ./pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-userdb}
      SMTP_API_KEY: ${SMTP_API_KEY:-changeme}
      EMAIL_FROM: ${EMAIL_FROM:-delivered@resend.dev}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    develop:
      watch:
        - path: ./app
          action: sync+restart
          target: /app/app
        - path: ./pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild

volumes:
  postgres_data:

networks:
  backend:
